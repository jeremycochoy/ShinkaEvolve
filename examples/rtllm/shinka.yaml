# RTLLM x ShinkaEvolve config for the self-contained example.
# Loaded by run_evo.py: EvolutionConfig(**evo_config) + DatabaseConfig(**db_config).
# By default it evolves the bundled adder_8bit design (initial.sv + example.jsonl);
# set RTLLM_DESIGN / RTLLM_PROBLEM_FILE to run a design extracted from an RTLLM clone.
max_evaluation_jobs: 2
max_proposal_jobs: 2
max_db_workers: 2

db_config:
  num_islands: 1
  archive_size: 12
  elite_selection_ratio: 0.3
  num_archive_inspirations: 1
  num_top_k_inspirations: 1
  migration_interval: 10
  migration_rate: 0.0
  island_elitism: true
  parent_selection_strategy: weighted
  parent_selection_lambda: 10
  archive_selection_strategy: fitness
  archive_criteria:
    combined_score: 1.0      # maximize PPA speedup
    loc: -0.1                # mild preference for shorter RTL

evo_config:
  patch_types: [diff, full, cross]
  patch_type_probs: [0.6, 0.3, 0.1]
  num_generations: 30         # raise for a stronger result
  max_api_costs: 3.0          # hard USD budget cap for this run
  max_patch_resamples: 3
  max_patch_attempts: 1
  max_novelty_attempts: 2
  job_type: local
  language: verilog           # .sv, // EVOLVE-BLOCK markers
  llm_models:
    - openrouter/qwen/qwen3-coder
    - openrouter/qwen/qwen3-235b-a22b-2507
    - openrouter/openai/gpt-oss-120b
  llm_dynamic_selection: ucb
  llm_kwargs:
    temperatures: [0.3, 0.7]
    max_tokens: 6144
  # Set a catalog-backed embedding model to enable novelty filtering.
  embedding_model: null
  code_embed_sim_threshold: 0.99
  use_text_feedback: true      # feed PPA numbers back to the LLM
  meta_rec_interval: null      # set to 10 to enable meta-recommendations
